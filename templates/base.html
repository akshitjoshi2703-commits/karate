<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Karate Learning Academy{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><a href="/">🥋 Karate Academy</a></div>
            <ul class="nav-links">
                <li><a href="/" class="{% if request.path == '/' %}active{% endif %}">Home</a></li>
                <li><a href="/techniques" class="{% if request.path == '/techniques' %}active{% endif %}">📚 Techniques</a></li>
                <li><a href="/videos" class="{% if request.path == '/videos' %}active{% endif %}">🎬 Videos</a></li>
                <li><a href="/drills" class="{% if request.path == '/drills' %}active{% endif %}">💪 Drills</a></li>
                <li><a href="/progress" class="{% if request.path == '/progress' %}active{% endif %}">📊 Progress</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
